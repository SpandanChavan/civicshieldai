name: CI

on:
  push:
    branches: [main, deployment]
  pull_request:
    branches: [main, deployment]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      # ── Local Supabase stack ─────────────────────────────────────────────────
      # Provides: Postgres 15, auth schema (auth.users / auth.uid() / auth.role()),
      # and applies supabase/migrations/001–008 in order.
      # No hosted project contacted; no CI secrets required.
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local stack
        # --workdir is the repo root: CLI appends supabase/ internally and finds config.toml there.
        # Backend job runs from backend/, so the repo root is one level up.
        run: supabase start --workdir ..

      # The local stack always uses these well-known public JWT values (same for
      # every project; documented in supabase.com/docs/guides/local-development).
      # Hardcoded here to avoid parsing supabase status output (fragile across CLI versions).
      - name: Export local stack credentials
        run: |
          echo "SUPABASE_URL=http://127.0.0.1:54321" >> $GITHUB_ENV
          echo "SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU" >> $GITHUB_ENV

      - name: Unit tests
        run: npm test
        env:
          NODE_ENV: test

      - name: Integration tests (RLS + smoke + e2e)
        # Runs against the isolated local Supabase stack.
        # No production data is touched. No secrets needed.
        run: npm run test:integration
        env:
          NODE_ENV: test

  frontend:
    name: Frontend (lint + build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test:ci
      - name: Build
        run: npm run build
        env:
          # Build-time placeholders so Vite doesn't fail on missing envs.
          VITE_SUPABASE_URL: http://localhost:54321
          VITE_SUPABASE_ANON_KEY: ci-placeholder
          VITE_BACKEND_URL: http://localhost:4000
          VITE_ML_SERVICE_URL: http://localhost:8000

  ml-service:
    name: ML service (import smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Import smoke test
        run: python -c "from app.main import app; print('FastAPI app imported OK')"

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Grep for likely real secrets in tracked files
        run: |
          # Fail if a real-looking secret appears OUTSIDE example/lock/workflow files.
          if git grep -nIE "(service_role.*eyJ|sk_live_|re_[A-Za-z0-9]{20,}|AC[a-f0-9]{32}|SUPABASE_SERVICE_KEY *= *eyJ)" \
               -- . ':(exclude)*.example' ':(exclude)*.lock' ':(exclude)package-lock.json' ':(exclude).github/workflows/ci.yml' ; then
            echo "::error::Potential secret detected in a tracked file"; exit 1
          fi
          echo "No obvious secrets found."
