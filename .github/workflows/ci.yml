name: CI

on:
  push:
    branches: [main, deployment]
  pull_request:
    branches: [main, deployment]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
        env:
          NODE_ENV: test

  frontend:
    name: Frontend (lint + build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test:ci
      - name: Build
        run: npm run build
        env:
          # Build-time placeholders so Vite doesn't fail on missing envs.
          VITE_SUPABASE_URL: http://localhost:54321
          VITE_SUPABASE_ANON_KEY: ci-placeholder
          VITE_BACKEND_URL: http://localhost:4000
          VITE_ML_SERVICE_URL: http://localhost:8000

  ml-service:
    name: ML service (import smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Import smoke test
        run: python -c "from app.main import app; print('FastAPI app imported OK')"

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Grep for likely real secrets in tracked files
        run: |
          # Fail if a real-looking secret appears OUTSIDE example/lock files.
          if git grep -nIE "(service_role.*eyJ|sk_live_|re_[A-Za-z0-9]{20,}|AC[a-f0-9]{32}|SUPABASE_SERVICE_KEY *= *eyJ)" \
               -- . ':(exclude)*.example' ':(exclude)*.lock' ':(exclude)package-lock.json' ':(exclude).github/workflows/ci.yml' ; then
            echo "::error::Potential secret detected in a tracked file"; exit 1
          fi
          echo "No obvious secrets found."
