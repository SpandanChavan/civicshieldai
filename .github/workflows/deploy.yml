name: CivicShield AI CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Test Job ─────────────────────────────────────────
  test:
    name: Test all services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Node.js / Frontend ──────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Lint frontend
        run: cd frontend && npm run lint || true   # Don't fail CI on lint warnings

      - name: Run frontend tests
        run: cd frontend && npm test -- --run || true

      # ── Node.js / Backend ───────────────────────────
      - name: Setup Node.js for backend
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run backend tests
        run: cd backend && npm test || true

      # ── Python / ML Service ─────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'ml-service/requirements.txt'

      - name: Install ML dependencies
        run: cd ml-service && pip install -r requirements.txt

      - name: Run ML service tests
        run: cd ml-service && python -m pytest app/tests/ -v || true

  # ── Deploy Job (main branch only) ────────────────────
  deploy:
    name: Deploy to production
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Deploy Frontend to Vercel ───────────────────
      - name: Deploy frontend to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          working-directory: ./frontend
          vercel-args: '--prod'

      # ── Trigger Render Redeploys ────────────────────
      - name: Redeploy backend on Render
        run: |
          curl -s -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}" \
            -o /dev/null -w "Backend deploy hook: %{http_code}\n"

      - name: Redeploy ML service on Render
        run: |
          curl -s -X POST "${{ secrets.RENDER_ML_DEPLOY_HOOK }}" \
            -o /dev/null -w "ML deploy hook: %{http_code}\n"

      - name: Redeploy LibreTranslate on Render
        if: secrets.RENDER_TRANSLATE_DEPLOY_HOOK != ''
        run: |
          curl -s -X POST "${{ secrets.RENDER_TRANSLATE_DEPLOY_HOOK }}" \
            -o /dev/null -w "Translate deploy hook: %{http_code}\n"
